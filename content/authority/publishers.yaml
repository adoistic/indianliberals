# Authority file: publishers
#
# Canonical IDs for publishers / imprints / institutional issuers of works
# in the corpus. Distinct from organisations.yaml — though some entities
# (Forum of Free Enterprise) appear in both, since they BOTH advocate AND
# publish. In those cases the publisher entry references the org entry.
#
# Status: FIRST CUT (2026-05-16). Adnan to review.
#
# Schema (per entry):
#   id:               kebab-case slug
#   canonical_name:   most common name
#   full_name:        formal name
#   sort_name:        for alphabetisation
#   also_known_as:    variants
#   place:            primary place of publication
#   founded_year:     int or null
#   ceased_year:      int or null
#   type:             org_publisher | trade_publisher | university_press |
#                     pamphlet_series | self_published | unknown
#   org_ref:          organisation ID if this publisher IS an org (overlap case)
#   note:             one sentence

publishers:

  # ============================================================
  # MOVEMENT PUBLISHERS — Where most primary works originated
  # ============================================================

  - id: forum-of-free-enterprise-press
    canonical_name: "Forum of Free Enterprise"
    full_name: "Forum of Free Enterprise"
    sort_name: "Forum of Free Enterprise"
    also_known_as:
      - "FFE"
    place: "Bombay / Mumbai"
    founded_year: 1956
    ceased_year: null
    type: org_publisher
    org_ref: forum-of-free-enterprise
    note: "Booklet and pamphlet series published by FFE. The single largest source of primary works in the Indian liberal canon — short, focused essays on free enterprise, taxation, planning critique."

  - id: indian-liberal-group-press
    canonical_name: "Indian Liberal Group"
    full_name: "Indian Liberal Group"
    sort_name: "Indian Liberal Group"
    also_known_as:
      - "ILG"
    place: "Mumbai"
    founded_year: 1968  # [NEEDS REVIEW]
    ceased_year: null
    type: org_publisher
    org_ref: indian-liberal-group
    note: "Publishes Freedom First magazine and occasional volumes. The intellectual continuation of the Swatantra Party's publishing arm."

  - id: swatantra-party-press
    canonical_name: "Swatantra Party publications"
    full_name: "Swatantra Party publications"
    sort_name: "Swatantra Party publications"
    also_known_as: []
    place: "Bombay / Madras"
    founded_year: 1959
    ceased_year: 1974
    type: org_publisher
    org_ref: swatantra-party
    note: "Party pamphlets, manifestos, conference proceedings, and Hindu/Tamil/Marathi tracts produced during the party's electoral years."

