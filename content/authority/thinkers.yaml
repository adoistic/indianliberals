  - id: raja-ram-mohan-roy
    canonical_name: "Raja Ram Mohan Roy"
    full_name: "Ram Mohan Roy"
    sort_name: "Roy, Raja Ram Mohan"
    also_known_as:
      - "Rammohan Roy"
      - "Ram Mohun Roy"
    birth_year: 1772
    death_year: 1833
    nationality: india
    tradition: reformer
    portrait:
      photo: null
      caricature: assets/thinkers/caricatures/raja-ram-mohan-roy.webp
    primary_themes: [social_reform, religious_reform, womens_rights, free_press]
    bio_note: "Bengal reformer; founder of the Brahmo Samaj. The intellectual progenitor of the Indian liberal tradition — campaigned against sati, for women's education, for free press, and for English-language modern education."
    affiliations: [brahmo-samaj]

  - id: gopal-krishna-gokhale
    canonical_name: "Gopal Krishna Gokhale"
