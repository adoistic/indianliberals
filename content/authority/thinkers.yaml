# Authority file: thinkers
#
# Canonical IDs for every person referenced in the Indian Liberals corpus.
# Used by the extraction pipeline to normalise author / contributor names
# against a controlled vocabulary, and surfaced in Sveltia CMS for editors.
#
# Status: FIRST CUT (2026-05-16). Adnan to review, fill gaps, correct dates.
# Entries marked [NEEDS REVIEW] need a librarian decision before locking.
#
# Schema (per entry):
#   id:             kebab-case slug, stable identifier (never changes)
#   canonical_name: how the thinker is most commonly referred to today
#   full_name:      birth-certificate / formal name where known
#   sort_name:      "Last, First" for alphabetisation
#   also_known_as:  list of variant spellings, transliterations, pen names
#   birth_year:     int or null
#   death_year:     int or null (null = living)
#   nationality:    primary affiliation country
#   tradition:      classical_liberal | reformer | nationalist_liberal |
#                   social_reformer | contemporary_liberal | international_influence
#   portrait:       relative paths into assets/thinkers/
#     photo:        path or null
#     caricature:   path or null (the hand-drawn ones)
#   primary_themes: list of theme IDs (from themes.yaml — Q4 work, forward ref)
#   bio_note:       one sentence on who they are
#   affiliations:   list of organisation IDs (forward ref to organisations.yaml)

thinkers:

