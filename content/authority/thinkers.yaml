    portrait:
      photo: assets/thinkers/photos/gopal-krishna-gokhale.jpeg
      caricature: null
    primary_themes: [constitutional_liberalism, gradual_reform, free_trade, education]
    bio_note: "Indian National Congress moderate; founder of the Servants of India Society. Gandhi's political mentor. Argued for constitutional reform and gradual self-government within the British system."
    affiliations: [servants-of-india-society, indian-national-congress]

  - id: pandita-ramabai
